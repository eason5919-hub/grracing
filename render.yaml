services:
  - type: web
    name: gr-racing-shared-server
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/server-data.json
    disk:
      name: gr-racing-data
      mountPath: /var/data
      sizeGB: 1
